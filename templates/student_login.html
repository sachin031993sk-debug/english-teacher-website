<!DOCTYPE html>
<html>

<head>

    <title>Student Login</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="topbar">
        Student Login
    </div>

    <div class="container">

        <form method="POST">

            <input type="text"
                   name="student_id"
                   placeholder="Student ID">

            <input type="text"
                   name="roll"
                   placeholder="Class Roll No">

            <button type="submit">
                Login
            </button>

        </form>

    </div>

</body>
</html>
