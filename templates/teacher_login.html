<!DOCTYPE html>
<html>

<head>

    <title>Teacher Login</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="topbar">
        Teacher Login
    </div>

    <div class="container">

        <form method="POST">

            <input type="text"
                   name="username"
                   placeholder="Username">

            <input type="password"
                   name="password"
                   placeholder="Password">

            <button type="submit">
                Login
            </button>

        </form>

    </div>

</body>
</html>
